<!DOCTYPE html>
<html>
<head>
<title>Birthday Surprise</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Confetti Library -->
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<style>
body{
    margin:0;
    font-family: 'Comic Sans MS', cursive;
    text-align:center;
    overflow:hidden;
    background: linear-gradient(135deg,#ff9a9e,#fad0c4,#ffdde1);
}

/* Sparkle Animation */
.sparkle{
    position:absolute;
    width:6px;
    height:6px;
    background:white;
    border-radius:50%;
    animation: float 4s linear infinite;
    opacity:0.8;
}
@keyframes float{
    from{transform: translateY(100vh);}
    to{transform: translateY(-10vh);}
}

.container{
    padding:50px 20px;
}

input{
    padding:15px;
    border-radius:30px;
    border:none;
    width:220px;
    font-size:16px;
}

button{
    padding:15px 25px;
    border-radius:30px;
    border:none;
    background:#ff4d6d;
    color:white;
    font-size:16px;
    cursor:pointer;
    box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

button:hover{
    background:#ff1e4d;
}

.hidden{
    display:none;
}

h1{
    color:white;
    text-shadow:2px 2px 8px #ff4d6d;
}

img{
    width:250px;
    margin-top:20px;
}
</style>
</head>

<body>

<!-- Background Music -->
<audio id="bgMusic" loop>
<source src="https://www2.cs.uic.edu/~i101/SoundFiles/HappyBirthday.wav" type="audio/wav">
</audio>

<div class="container" id="page1">
    <h1>Enter Your Name 💖</h1>
    <input type="text" id="nameInput" placeholder="Type your name...">
    <br><br>
    <button onclick="showWish()">Open Surprise 🎁</button>
</div>

<div class="container hidden" id="page2">
    <h1 id="wishText"></h1>
    <img src="https://cdn.pixabay.com/photo/2016/03/31/19/56/girl-1294358_1280.png">
</div>

<script>

/* Sparkle Generator */
for(let i=0;i<50;i++){
    let sparkle=document.createElement("div");
    sparkle.className="sparkle";
    sparkle.style.left=Math.random()*100+"vw";
    sparkle.style.animationDuration=(Math.random()*3+2)+"s";
    document.body.appendChild(sparkle);
}

/* Show Wish Function */
function showWish(){
    var name=document.getElementById("nameInput").value;
    if(name==""){
        alert("Please enter name 😊");
        return;
    }

    document.getElementById("page1").style.display="none";
    document.getElementById("page2").classList.remove("hidden");

    document.getElementById("wishText").innerHTML=
        "Happy Birthday "+name+" 🎂💖<br>May your day be filled with love & happiness!";

    /* Play Music */
    document.getElementById("bgMusic").play();

    /* Confetti Burst */
    confetti({
        particleCount:200,
        spread:100,
        origin:{y:0.6}
    });
}
</script>

</body>
</html>
