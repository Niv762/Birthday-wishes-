<!DOCTYPE html>
<html>
<head>
    <title>Birthday Surprise</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body{
            margin:0;
            font-family: 'Comic Sans MS', cursive;
            text-align:center;
            background: linear-gradient(to right, #ff9a9e, #fad0c4);
        }
        .container{
            padding:40px;
        }
        input{
            padding:12px;
            border-radius:20px;
            border:none;
            width:200px;
        }
        button{
            padding:12px 20px;
            border-radius:20px;
            border:none;
            background:#ff4d6d;
            color:white;
            cursor:pointer;
        }
        .hidden{
            display:none;
        }
        img{
            width:200px;
            margin-top:20px;
        }
        h1{
            color:#fff;
        }
    </style>
</head>
<body>

<div class="container" id="page1">
    <h1>Enter Your Name 💖</h1>
    <input type="text" id="nameInput" placeholder="Type your name...">
    <br><br>
    <button onclick="showWish()">Click Here 🎁</button>
</div>

<div class="container hidden" id="page2">
    <h1 id="wishText"></h1>
    <img src="https://i.imgur.com/4AiXzf8.png" alt="Cute Doll Guitar">
</div>

<script>
function showWish(){
    var name = document.getElementById("nameInput").value;
    if(name==""){
        alert("Please enter name 😊");
        return;
    }
    document.getElementById("page1").style.display="none";
    document.getElementById("page2").classList.remove("hidden");
    document.getElementById("wishText").innerHTML =
        "Happy Birthday " + name + " 🎂💖<br>May your day be full of love & happiness!";
}
</script>

</body>
</html>
