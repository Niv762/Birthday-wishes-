<!DOCTYPE html>
<html>
<head>
<title>Birthday Surprise</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
    margin:0;
    font-family: 'Comic Sans MS', cursive;
    text-align:center;
    overflow:hidden;
    background: linear-gradient(135deg,#ff9a9e,#fad0c4,#ffdde1);
}

/* Sparkle */
.sparkle{
    position:absolute;
    width:6px;
    height:6px;
    background:white;
    border-radius:50%;
    animation: float 4s linear infinite;
    opacity:0.8;
}
@keyframes float{
    from{transform: translateY(100vh);}
    to{transform: translateY(-10vh);}
}

.container{
    padding:50px 20px;
}

input{
    padding:15px;
    border-radius:30px;
    border:none;
    width:220px;
    font-size:16px;
}

button{
    padding:15px 25px;
    border-radius:30px;
    border:none;
    background:#ff4d6d;
    color:white;
    font-size:16px;
    cursor:pointer;
    box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

button:hover{
    background:#ff1e4d;
}

.hidden{
    display:none;
}

h1{
    color:white;
    text-shadow:2px 2px 8px #ff4d6d;
}

img{
    width:250px;
    margin-top:20px;
}

/* Confetti Canvas */
canvas{
    position:fixed;
    top:0;
    left:0;
    pointer-events:none;
}
</style>
</head>

<body>

<audio id="bgMusic" loop>
<source src="birthday.mp3" type="audio/mpeg">
</audio>

<div class="container" id="page1">
    <h1>Enter Your Name 💖</h1>
    <input type="text" id="nameInput" placeholder="Type your name...">
    <br><br>
    <button onclick="showWish()">Open Surprise 🎁</button>
</div>

<div class="container hidden" id="page2">
    <h1 id="wishText"></h1>
    <img src="doll.png">
</div>

<canvas id="confettiCanvas"></canvas>

<script>

/* Sparkle */
for(let i=0;i<60;i++){
    let sparkle=document.createElement("div");
    sparkle.className="sparkle";
    sparkle.style.left=Math.random()*100+"vw";
    sparkle.style.animationDuration=(Math.random()*3+2)+"s";
    document.body.appendChild(sparkle);
}

/* Confetti Simple */
const canvas = document.getElementById('confettiCanvas');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];

function createConfetti(){
    for(let i=0;i<150;i++){
        particles.push({
            x:Math.random()*canvas.width,
            y:Math.random()*canvas.height,
            r:Math.random()*6+4,
            d:Math.random()*150,
            color:"hsl("+Math.random()*360+",100%,70%)",
            tilt:Math.floor(Math.random()*10)-10
        });
    }
}

function drawConfetti(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    particles.forEach(p=>{
        ctx.beginPath();
        ctx.arc(p.x,p.y,p.r,0,Math.PI*2,false);
        ctx.fillStyle=p.color;
        ctx.fill();
    });
}

function showWish(){
    var name=document.getElementById("nameInput").value;
    if(name==""){
        alert("Please enter name 😊");
        return;
    }

    document.getElementById("page1").style.display="none";
    document.getElementById("page2").classList.remove("hidden");

    document.getElementById("wishText").innerHTML=
        "Happy Birthday "+name+" 🎂💖<br>May your day be filled with love & happiness!";

    document.getElementById("bgMusic").play();

    createConfetti();
    setInterval(drawConfetti,20);
}

</script>

</body>
</html>
